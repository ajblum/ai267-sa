# PIPELINE DEFINITION
# Name: sentiment
# Description: Sentiment analysis pipeline with configurable classifier.
# Inputs:
#    classifier_name: str [Default: 'MultinomialNB']
#    s3_data_path: str [Default: 's3://dspa-experiments/data/data.csv']
# Outputs:
#    Output: system.Model
#    evaluate-model-classification_metrics: system.ClassificationMetrics
#    evaluate-model-metrics: system.Metrics
components:
  comp-evaluate-model:
    executorLabel: exec-evaluate-model
    inputDefinitions:
      artifacts:
        model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        classification_metrics:
          artifactType:
            schemaTitle: system.ClassificationMetrics
            schemaVersion: 0.0.1
        metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        report:
          artifactType:
            schemaTitle: system.Markdown
            schemaVersion: 0.0.1
  comp-importer:
    executorLabel: exec-importer
    inputDefinitions:
      parameters:
        uri:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        artifact:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-preprocess-data:
    executorLabel: exec-preprocess-data
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        train_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-train-model:
    executorLabel: exec-train-model
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        classifier_name:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-evaluate-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.5.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'pandas>=2.0.0'\
          \ 'scikit-learn>=1.3.0' 'joblib>=1.3.0' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_model(\n    model: Input[Model],\n    test_dataset:\
          \ Input[Dataset],\n    metrics: Output[Metrics],\n    classification_metrics:\
          \ Output[ClassificationMetrics],\n    report: Output[Markdown],\n):\n  \
          \  \"\"\"Evaluate the trained model and produce metrics and a report.\"\"\
          \"\n    import joblib\n    import pandas as pd\n    from sklearn.metrics\
          \ import confusion_matrix, accuracy_score\n\n    classifier = joblib.load(model.path)\n\
          \n    test_data = pd.read_csv(test_dataset.path)\n    X_test = test_data.text\n\
          \    y_test = test_data.label\n\n    predictions = classifier.predict(X_test)\n\
          \    score = accuracy_score(y_test, predictions)\n\n    classes = [\"negative\"\
          , \"positive\"]\n    conf_matrix = confusion_matrix(y_test, predictions).tolist()\n\
          \n    metrics.log_metric(\"accuracy\", score)\n    classification_metrics.log_confusion_matrix(classes,\
          \ conf_matrix)\n\n    content = \"# Sentiment Prediction Report on Test\
          \ Set\\n\\n\"\n    for text, prediction, expected in zip(X_test, predictions,\
          \ y_test):\n        predicted_class = classes[int(prediction)]\n       \
          \ expected_class = classes[int(expected)]\n        content += (\n      \
          \      f\"- Text: {text}, \"\n            f\"Prediction: {predicted_class},\
          \ \"\n            f\"Expected: {expected_class}\\n\"\n        )\n\n    with\
          \ open(report.path, \"w\") as f:\n        f.write(content)\n\n"
        image: registry.ocp4.example.com:8443/redhattraining/ai0020l-base:latest
    exec-importer:
      importer:
        artifactUri:
          runtimeParameter: uri
        typeSchema:
          schemaTitle: system.Dataset
          schemaVersion: 0.0.1
    exec-preprocess-data:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - preprocess_data
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.5.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'pandas>=2.0.0'\
          \ 'scikit-learn>=1.3.0' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef preprocess_data(\n    dataset: Input[Dataset],\n    train_dataset:\
          \ Output[Dataset],\n    test_dataset: Output[Dataset],\n):\n    \"\"\"Clean\
          \ text data and split into training and testing subsets.\"\"\"\n    import\
          \ pandas as pd\n    from sklearn.model_selection import train_test_split\n\
          \n    data = pd.read_csv(dataset.path)\n    data[\"comment\"] = data[\"\
          comment\"].str.strip()\n\n    class_ids = {\"positive\": 1, \"negative\"\
          : 0}\n    data[\"label\"] = data.sentiment.map(class_ids)\n\n    X_train,\
          \ X_test, y_train, y_test = train_test_split(\n        data.comment, data.label,\
          \ test_size=0.2, random_state=20\n    )\n\n    train_data = pd.DataFrame({\"\
          text\": X_train, \"label\": y_train})\n    train_data.to_csv(train_dataset.path,\
          \ index=False)\n\n    test_data = pd.DataFrame({\"text\": X_test, \"label\"\
          : y_test})\n    test_data.to_csv(test_dataset.path, index=False)\n\n"
        image: registry.ocp4.example.com:8443/redhattraining/ai0020l-base:latest
    exec-train-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.5.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'pandas>=2.0.0'\
          \ 'scikit-learn>=1.3.0' 'joblib>=1.3.0' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_model(\n    dataset: Input[Dataset],\n    classifier_name:\
          \ str,\n    model: Output[Model],\n):\n    \"\"\"Train a classifier on the\
          \ training dataset.\"\"\"\n    import importlib\n    import joblib\n   \
          \ import pandas as pd\n    from sklearn.pipeline import make_pipeline\n\
          \    from sklearn.feature_extraction.text import TfidfVectorizer\n\n   \
          \ train_dataset = pd.read_csv(dataset.path)\n    X_train = train_dataset.text\n\
          \    y_train = train_dataset.label\n\n    # Dynamically import the classifier\
          \ class\n    if classifier_name == \"MultinomialNB\":\n        module =\
          \ importlib.import_module(\"sklearn.naive_bayes\")\n    elif classifier_name\
          \ == \"DecisionTreeClassifier\":\n        module = importlib.import_module(\"\
          sklearn.tree\")\n    else:\n        raise ValueError(f\"Unsupported classifier:\
          \ {classifier_name}\")\n\n    classifier_class = getattr(module, classifier_name)\n\
          \    kwargs = {\"random_state\": 0} if classifier_name == \"DecisionTreeClassifier\"\
          \ else {}\n    classifier = make_pipeline(TfidfVectorizer(), classifier_class(**kwargs))\n\
          \    classifier.fit(X_train, y_train)\n\n    joblib.dump(classifier, model.path)\n\
          \n"
        image: registry.ocp4.example.com:8443/redhattraining/ai0020l-base:latest
pipelineInfo:
  description: Sentiment analysis pipeline with configurable classifier.
  name: sentiment
root:
  dag:
    outputs:
      artifacts:
        Output:
          artifactSelectors:
          - outputArtifactKey: model
            producerSubtask: train-model
        evaluate-model-classification_metrics:
          artifactSelectors:
          - outputArtifactKey: classification_metrics
            producerSubtask: evaluate-model
        evaluate-model-metrics:
          artifactSelectors:
          - outputArtifactKey: metrics
            producerSubtask: evaluate-model
    tasks:
      evaluate-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-evaluate-model
        dependentTasks:
        - preprocess-data
        - train-model
        inputs:
          artifacts:
            model:
              taskOutputArtifact:
                outputArtifactKey: model
                producerTask: train-model
            test_dataset:
              taskOutputArtifact:
                outputArtifactKey: test_dataset
                producerTask: preprocess-data
        taskInfo:
          name: evaluate-model
      importer:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-importer
        inputs:
          parameters:
            uri:
              componentInputParameter: s3_data_path
        taskInfo:
          name: importer
      preprocess-data:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-preprocess-data
        dependentTasks:
        - importer
        inputs:
          artifacts:
            dataset:
              taskOutputArtifact:
                outputArtifactKey: artifact
                producerTask: importer
        taskInfo:
          name: preprocess-data
      train-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-model
        dependentTasks:
        - preprocess-data
        inputs:
          artifacts:
            dataset:
              taskOutputArtifact:
                outputArtifactKey: train_dataset
                producerTask: preprocess-data
          parameters:
            classifier_name:
              componentInputParameter: classifier_name
        taskInfo:
          name: train-model
  inputDefinitions:
    parameters:
      classifier_name:
        defaultValue: MultinomialNB
        isOptional: true
        parameterType: STRING
      s3_data_path:
        defaultValue: s3://dspa-experiments/data/data.csv
        isOptional: true
        parameterType: STRING
  outputDefinitions:
    artifacts:
      Output:
        artifactType:
          schemaTitle: system.Model
          schemaVersion: 0.0.1
      evaluate-model-classification_metrics:
        artifactType:
          schemaTitle: system.ClassificationMetrics
          schemaVersion: 0.0.1
      evaluate-model-metrics:
        artifactType:
          schemaTitle: system.Metrics
          schemaVersion: 0.0.1
schemaVersion: 2.1.0
sdkVersion: kfp-2.5.0
